services:
  - type: web
    name: inventorysystem
    runtime: python
    plan: free
    buildCommand: bash build.sh
    startCommand: cd InventoryProject && gunicorn InventoryProject.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.3
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_ALLOWED_HOSTS
        value: "127.0.0.1,localhost"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: inventorysystem-db
          property: connectionString

databases:
  - name: inventorysystem-db
    databaseName: inventorysystem
    plan: free
